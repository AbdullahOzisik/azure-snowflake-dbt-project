name: 'azure_snowflake_dbt_project'
version: '1.0.0'
config-version: 2

# Verwijst naar het profiel in ~/.dbt/profiles.yml (zie profiles.yml.example)
profile: 'azure_snowflake_dbt_project'

# Mappen
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Modelconfiguratie:
#   staging  -> views (licht opschonen, goedkoop, altijd vers)
#   marts    -> dynamic tables: Snowflake houdt ze zelf vers binnen 'target_lag',
#               dus de orkestratie/refresh gebeurt declaratief ín Snowflake
#               (geen externe scheduler nodig).
models:
  azure_snowflake_dbt_project:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: dynamic_table
      +snowflake_warehouse: TRANSFORMING
      +target_lag: "1 hour"
      +schema: marts
