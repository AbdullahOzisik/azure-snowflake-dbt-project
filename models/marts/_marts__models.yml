version: 2

models:
  - name: dim_customers
    description: "Klantdimensie verrijkt met ordermetrics (aantal orders, lifetime value)."
    columns:
      - name: customer_id
        description: "Primaire sleutel."
        tests:
          - unique
          - not_null
      - name: number_of_orders
        description: "Totaal aantal orders van de klant."
        tests:
          - not_null
