# CD — rolt de infrastructuur daadwerkelijk uit naar Azure.
# Start ALLEEN handmatig (workflow_dispatch). Dit maakt echte resources aan
# en KOST GELD. Vereist secrets + een service principal met OIDC (zie onder).

name: Deploy (Terraform apply)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Omgeving om uit te rollen"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]

permissions:
  id-token: write # nodig voor OIDC-login naar Azure
  contents: read

jobs:
  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    # 'environment' geeft je in GitHub een goedkeuringsstap + aparte secrets.
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: terraform
    # Terraform (provider + azurerm backend) authenticeert via OIDC met deze env-vars.
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Inloggen zonder wachtwoord via OIDC federated credentials.
      # Stel deze secrets in onder Settings > Secrets and variables > Actions:
      #   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Init
        run: terraform init

      # Variabelen via -var (de .tfvars-bestanden staan in .gitignore).
      - name: Plan
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="environment=${{ inputs.environment }}"

      - name: Apply
        run: |
          terraform apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="environment=${{ inputs.environment }}"

  # ---------------------------------------------------------------------------
  # Na de infra: dbt build (run + test) tegen Snowflake. Hiermee is de CD
  # end-to-end: Azure-infra én de transformatielaag worden uitgerold.
  # Vereist secrets (Settings > Secrets and variables > Actions, per environment):
  #   SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_PASSWORD
  dbt:
    name: dbt build
    needs: apply
    runs-on: ubuntu-latest
    # Zelfde environment-gate + (environment-specifieke) secrets als de apply-job.
    environment: ${{ inputs.environment }}
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      # Gebruik het voorbeeldprofiel; account/user/password komen uit secrets.
      - name: Prepare profile
        run: cp profiles.yml.example profiles.yml

      - name: dbt deps
        run: dbt deps

      # build = run + test in één: bouwt de modellen en draait meteen de tests.
      # -t kiest het juiste target (dev/prod) op basis van de gekozen omgeving.
      - name: dbt build
        run: dbt build -t ${{ inputs.environment }}
